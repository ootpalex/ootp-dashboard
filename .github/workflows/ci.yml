name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pipeline-tests:
    name: Python pipeline (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            model/requirements.txt
            model/requirements-dev.txt

      - name: Install dependencies
        working-directory: model
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        working-directory: model
        # Tests with user-data fixtures skip cleanly when the leagues/<slug>/csv/
        # data isn't present (CI doesn't ship player CSVs). Pure-logic tests
        # cover most of the pipeline math.
        run: python -m pytest --no-header -q

  frontend-build:
    name: React SPA (Vite build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build
        working-directory: app
        run: npm run build
